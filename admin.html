<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filtrador IA — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-layout">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-brand">Filtrador<span style="color:var(--accent)">IA</span> <span style="font-size:11px;color:var(--danger);letter-spacing:1px;font-weight:700;margin-left:8px">ADMIN</span></div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="btn-ghost" style="font-size:12px;padding:6px 12px" onclick="logout()">Salir</button>
    </div>
  </header>

  <!-- Nav -->
  <nav class="admin-nav">
    <button class="admin-nav-tab active" onclick="showAdminPage('dashboard', this)">📊 Dashboard</button>
    <button class="admin-nav-tab" onclick="showAdminPage('usuarios', this)">👥 Usuarios</button>
    <button class="admin-nav-tab" onclick="showAdminPage('filtrador', this)">⚡ Filtrador</button>
  </nav>

  <!-- ─── PAGE: DASHBOARD ─── -->
  <div class="admin-page active" id="page-dashboard">
    <div class="dashboard-body">

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">Total clientes</div>
          <div class="stat-card-value" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Activos</div>
          <div class="stat-card-value green" id="statActive">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">En prueba</div>
          <div class="stat-card-value yellow" id="statTrial">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Inactivos</div>
          <div class="stat-card-value red" id="statInactive">—</div>
        </div>
      </div>

      <!-- Recent users table -->
      <div class="section-header">
        <span class="section-title">Clientes recientes</span>
        <button class="btn-primary" style="font-size:13px;padding:8px 16px" onclick="showAdminPage('usuarios', document.querySelector('.admin-nav-tab:nth-child(2)'))">Ver todos</button>
      </div>
      <div class="users-table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Empresa</th><th>Rol</th><th>Plan</th><th>Vence trial</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- ─── PAGE: USUARIOS ─── -->
  <div class="admin-page" id="page-usuarios">
    <div class="dashboard-body">
      <div class="section-header">
        <span class="section-title">Gestión de usuarios</span>
        <div style="display:flex;gap:10px;align-items:center">
          <input type="text" id="userSearch" placeholder="Buscar..." style="width:220px" oninput="renderUsersTable(this.value)">
          <button class="btn-primary" style="font-size:13px;padding:8px 16px;white-space:nowrap" onclick="openCreateUser()">+ Nuevo usuario</button>
        </div>
      </div>
      <div class="users-table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Empresa</th><th>Rol</th><th>Plan</th><th>Vence trial</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody id="usersBodyFull">
            <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ─── PAGE: FILTRADOR ─── -->
  <div class="admin-page" id="page-filtrador" style="overflow:hidden">
    <iframe src="app.html" class="admin-app-frame" style="flex:1;border:none;width:100%;height:100%"></iframe>
  </div>

  <!-- ─── MODAL: Crear usuario ─── -->
  <div class="modal-overlay" id="createUserModal">
    <div class="modal" style="max-width:520px">
      <div class="modal-title">NUEVO USUARIO</div>

      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="newUserEmail" placeholder="cliente@empresa.com">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="newUserPassword" placeholder="Contraseña segura">
        </div>
      </div>
      <div class="form-group">
        <label>Nombre de la empresa</label>
        <input type="text" id="newOrgName" placeholder="Ej: REPUESTERA SAN MARTÍN">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Plan</label>
          <select id="newUserPlan">
            <option value="trial">Trial</option>
            <option value="active">Activo</option>
          </select>
        </div>
        <div class="form-group" id="trialRow">
          <label>Días de prueba</label>
          <input type="number" id="trialDays" value="3" min="1" max="30">
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeCreateUser()">Cancelar</button>
        <button class="btn-primary" id="createUserBtn" onclick="createUser()">Crear usuario</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
  <script>
    (async () => {
      const ctx = await requireAdmin();
      if (!ctx) return;
      document.getElementById('topbarUser').textContent = ctx.session.user.email;
      await loadAdminData();
    })();

    function showAdminPage(id, tab) {
      document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.admin-nav-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('page-' + id).classList.add('active');
      if (tab) tab.classList.add('active');

      if (id === 'usuarios') {
        const tbody = document.getElementById('usersBodyFull');
        if (tbody) {
          const origBody = document.getElementById('usersBody');
          if (origBody) tbody.innerHTML = origBody.innerHTML;
        }
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filtrador IA — Ingresar</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-main">Filtrador IA</span>
      <span class="auth-logo-sub">Sistema de Filtrado de Listas</span>
    </div>

    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <div class="auth-error" id="authError"></div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span id="loginText">Ingresar</span>
        <span class="spinner" id="loginSpinner" style="display:none"></span>
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script>
    (async () => {
      const session = await getSession();
      if (session) {
        const profile = await getProfile(session.user.id);
        window.location.href = profile?.role === 'admin' ? 'admin.html' : 'app.html';
      }
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('authError');
      const btn      = document.getElementById('loginBtn');
      const spinner  = document.getElementById('loginSpinner');
      const text     = document.getElementById('loginText');

      errEl.classList.remove('show');
      btn.disabled = true;
      spinner.style.display = 'inline-block';
      text.style.display = 'none';

      const { data, error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        errEl.textContent = 'Email o contraseña incorrectos.';
        errEl.classList.add('show');
        btn.disabled = false;
        spinner.style.display = 'none';
        text.style.display = 'inline';
        return;
      }

      const profile = await getProfile(data.user.id);

      if (!profile || profile.status === 'inactive') {
        await db.auth.signOut();
        errEl.textContent = 'Tu cuenta está inactiva. Contactá al administrador.';
        errEl.classList.add('show');
        btn.disabled = false;
        spinner.style.display = 'none';
        text.style.display = 'inline';
        return;
      }

      if (profile.role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        const org = profile.organizations;
        if (org?.plan === 'trial' && org?.trial_expires_at) {
          const expired = new Date(org.trial_expires_at) < new Date();
          if (expired) {
            await db.auth.signOut();
            errEl.textContent = 'Tu período de prueba expiró. Contactá al administrador.';
            errEl.classList.add('show');
            btn.disabled = false;
            spinner.style.display = 'none';
            text.style.display = 'inline';
            return;
          }
        }
        window.location.href = 'app.html';
      }
    });

    async function getSession() {
      const { data: { session } } = await db.auth.getSession();
      return session;
    }
    async function getProfile(userId) {
      const { data } = await db.from('user_profiles').select('*, organizations(*)').eq('id', userId).single();
      return data;
    }
  </script>
</body>
</html>
